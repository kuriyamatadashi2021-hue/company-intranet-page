<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内イントラサイト</title>
<style>
  :root {
    --main-color: #2c3e50;
    --accent-color: #3498db;
    --bg-color: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
  }
  header {
    background-color: var(--main-color);
    padding: 24px 0;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  header img {
    max-height: 80px;
    height: auto;
  }
  main {
    max-width: 960px;
    margin: 32px auto;
    padding: 0 20px;
  }
  h2 {
    font-size: 18px;
    color: var(--main-color);
    border-left: 5px solid var(--accent-color);
    padding-left: 10px;
    margin: 36px 0 18px;
  }

  /* NEWS */
  #news {
    background-color: var(--card-bg);
    border-radius: 8px;
    padding: 8px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  #news ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  #news li {
    display: flex;
    gap: 14px;
    padding: 12px 4px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  #news li:last-child { border-bottom: none; }
  #news .date {
    color: var(--accent-color);
    font-weight: 600;
    white-space: nowrap;
  }
  #news .empty {
    color: #999;
    padding: 12px 4px;
    font-size: 14px;
  }

  /* グリッド：ロゴタイル */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 18px;
  }
  .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--main-color);
    margin-bottom: 6px;
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tile {
    width: 100%;
    aspect-ratio: 1 / 1;
    background-color: var(--card-bg);
    border: 1px solid #e3e8ec;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text-color);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
    padding: 14px;
  }
  .tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.16);
  }
  .tile img {
    max-width: 70%;
    max-height: 70%;
    object-fit: contain;
  }
  .tile.disabled {
    cursor: default;
    pointer-events: none;
    background-color: #f2f4f6;
    box-shadow: none;
  }
  .tile.disabled img { opacity: 0.4; }
  .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 10px;
    background-color: #bbb;
    color: #fff;
    border-radius: 4px;
    padding: 1px 6px;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: #999;
  }

  /* ロック画面 */
  #lock-screen {
    position: fixed;
    inset: 0;
    background-color: var(--main-color);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  #lock-box {
    background-color: #fff;
    border-radius: 10px;
    padding: 36px 32px;
    width: 90%;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #lock-box img { max-height: 60px; margin-bottom: 20px; }
  #lock-box input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-bottom: 12px;
  }
  #lock-box button {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    background-color: var(--accent-color);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  #lock-box button:hover { background-color: #2980b9; }
  #lock-error { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 16px; }
  body.locked > header,
  body.locked > main,
  body.locked > footer { display: none; }

  /* ポップアップ */
  #popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1100;
  }
  #popup-overlay.show { display: flex; }
  #popup-box {
    background: #fff;
    border-radius: 10px;
    padding: 28px 26px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #popup-box p { font-size: 15px; margin: 0 0 20px; line-height: 1.6; }
  #popup-box button {
    padding: 8px 24px;
    font-size: 14px;
    background: var(--accent-color);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<script>
(function () {
  var STORAGE_KEY = "intranet_auth_v1";
  var PASSWORD_HASH = "c2a4885469c5457da86f6246a7fc5ca6b77aac45d4b4bf6e98b8cb8bff5449cf";

  function sha256(text) {
    var data = new TextEncoder().encode(text);
    return crypto.subtle.digest("SHA-256", data).then(function (buf) {
      return Array.prototype.map
        .call(new Uint8Array(buf), function (b) { return b.toString(16).padStart(2, "0"); })
        .join("");
    });
  }

  function unlock() {
    document.body.classList.remove("locked");
    var ls = document.getElementById("lock-screen");
    if (ls) ls.remove();
  }

  if (localStorage.getItem(STORAGE_KEY) === PASSWORD_HASH) {
    unlock();
  } else {
    document.getElementById("lock-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var input = document.getElementById("lock-password").value;
      sha256(input).then(function (hash) {
        if (hash === PASSWORD_HASH) {
          localStorage.setItem(STORAGE_KEY, hash);
          unlock();
        } else {
          document.getElementById("lock-error").textContent = "パスワードが違います";
        }
      });
    });
  }

  /* ポップアップ */
  function showPopup(message) {
    document.getElementById("popup-message").textContent = message;
    document.getElementById("popup-overlay").classList.add("show");
  }
  document.getElementById("popup-close").addEventListener("click", function () {
    document.getElementById("popup-overlay").classList.remove("show");
  });
  document.getElementById("popup-overlay").addEventListener("click", function (e) {
    if (e.target === this) this.classList.remove("show");
  });
  document.getElementById("staff-ticket").addEventListener("click", function (e) {
    e.preventDefault();
    showPopup("シノロジーチャットをご確認ください");
  });
})();
</script>
